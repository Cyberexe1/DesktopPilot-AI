name: Deploy Cloud API to App Runner

# Build the backend container, push to Amazon ECR, and trigger an App Runner
# deployment. Runs on pushes to main that touch the backend.
on:
  push:
    branches: [ main ]
    paths:
      - 'DesktopPilot/backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:   # allow manual runs from the Actions tab

env:
  AWS_REGION:    us-east-1
  ECR_REPOSITORY: desktoppilot-cloud-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        working-directory: DesktopPilot/backend
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Trigger App Runner deployment
        if: ${{ secrets.APPRUNNER_SERVICE_ARN != '' }}
        run: |
          aws apprunner start-deployment \
            --service-arn "${{ secrets.APPRUNNER_SERVICE_ARN }}" \
            --region "$AWS_REGION"
